  - id: I01
    description: 'Baseline linear static analysis plus normal modes check. Coarse
      8mm global mesh, refined to 3mm at frame attachment points and stringer cutouts.
      Simplified BCs at STA 1740 fuselage attachment ring. Three load cases: pull-up
      1.5g, pushover -0.5g, lateral gust 0.3g. Normal modes extracted to verify first
      frequency above 40 Hz flutter threshold. Results reviewed against hand calc
      per ES-STR-012.'
    filename_base: AERO_FSLGFRM_V01I01_IMPLICIT
    created_by: j.smith
    created_on: '2025-09-10 08:30:00'
    solver_type: IMPLICIT
    analysis_types:
    - LINEAR
    - NORMAL MODES
    status: production
    notes:
    - Run 01 submitted to cluster at 09:15 on 2025-09-10. Wall clock time 22 min.
    - Max displacement 3.2 mm at stringer cutout - passes 5.0 mm allowable per ES-STR-012
      (margin 36%).
    - First natural frequency 42.3 Hz - above 40 Hz flutter threshold. Acceptable.
    - Load magnitude at FS180 corrected in Run 02 per LM-2025-047 (12.4 kN to 14.1
      kN). Stress recalculated.
    - Results reviewed in DRB-2025-079 on 2025-09-20. Action item AI-STR-047 raised
      to refine mesh at cutout region in V02.
    - '[Promoted to Production] on 2025-09-25 10:30:00 by j.smith - Runs: Run 01,
      Run 02'
    promoted_at: '2025-09-25 10:30:00'
    runs:
    - id: 1
      name: Run 01
      date: '2025-09-10 09:15:00'
      status: converged
      created_by: j.smith
      comments: 'Load cases: 1.5g pull-up, -0.5g pushover, 0.3g lateral gust.

        Mesh: 8mm global, 3mm at attachment BCs and stringer cutouts.

        Max displacement: 3.2 mm at FS180 cutout (allowable 5.0 mm, margin 36%).

        Max stress: 218 MPa at stringer cutout (allowable 310 MPa, margin 30%).

        First natural frequency: 42.3 Hz (above 40 Hz threshold).

        Hand calc correlation: within 7% for critical load path forces.

        Note: load at FS180 needs verification vs LM-2025-047 - corrected in Run 02.'
      artifacts:
        input: []
        output: []
        is_production: true
    - id: 2
      name: Run 02
      date: '2025-09-24 17:45:00'
      status: converged
      created_by: j.smith
      comments: 'Load correction: FS180 force updated 12.4 kN -> 14.1 kN per LM-2025-047.

        Max displacement: 3.7 mm (within 5.0 mm allowable, margin 26%).

        Max stress: 242 MPa at stringer cutout (allowable 310 MPa, margin 22%).

        Normal modes unchanged - first frequency 42.1 Hz (shift <1 Hz).

        Hand calc correlation: 5% on critical path forces, 9% on peak stress.

        Conclusion: model behaviour well understood. Ready for Production.'
      artifacts:
        input: []
        output: []
        is_production: true
  - id: I02
    description: Buckling analysis of frame web panel under combined compression and
      shear (-0.5g pushover load case). Compression-only contact supports at flange
      edges. Geometric imperfection per ES-1234 Rev A (1% of minimum web dimension).
      First 6 buckling eigenmodes extracted.
    filename_base: AERO_FSLGFRM_V01I02_IMPLICIT
    created_by: j.smith
    created_on: '2025-09-15 14:00:00'
    solver_type: IMPLICIT
    analysis_types:
    - BUCKLING
    status: deprecated
    notes:
    - Run 01 showed buckling load factor 1.32 - marginal against target of 1.5. Mesh
      refinement requested.
    - Run 02 with refined mesh gave load factor 1.41 - improved but below 1.5 target.
      Geometry change required.
    - Deprecated - superseded by V02 I02 with fully refined mesh and corrected imperfection
      per ES-1234 Rev B.
    promoted_at: ''
    runs:
    - id: 1
      name: Run 01
      date: '2025-09-15 15:00:00'
      status: converged
      created_by: j.smith
      comments: 'Buckling - first run. Global 5mm mesh, 2mm at web panel.

        Buckling load factor LF1: 1.32 - marginal against target >=1.5 (ES-STR-015).

        First mode: symmetric web panel buckling at FS180 cutout.

        LF2 (asymmetric): 1.89 - not critical.

        Action: refine mesh at cutout corners - suspect artificial stiffness.'
      artifacts:
        input: []
        output: []
        is_production: false
    - id: 2
      name: Run 02
      date: '2025-09-22 11:00:00'
      status: converged
      created_by: j.smith
      comments: 'Mesh refined at cutout corners to 1.5mm. Imperfection per ES-1234.

        Buckling LF1: 1.41 (vs 1.32 Run 01 - improvement but still below 1.5).

        LF2: 1.74 - not critical.

        Conclusion: web panel geometry change required.

        Recommendation: add rib stiffener at FS180 cutout edge (carried to V02 per
        ECO-2025-312).'
      artifacts:
        input: []
        output: []
        is_production: false
