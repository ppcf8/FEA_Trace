  created_on: '2025-09-10 08:30:00'
  notes:
  - Initial version created for PDR load case assessment. Three load cases covered
    - 1.5g pull-up, -0.5g pushover, and lateral gust per CS-25.341. Model reviewed
    and approved in DRB-2025-061.
  - Iteration I02 (buckling) deprecated - superseded by V02 I02 with corrected mesh
    refinement per ES-1234 Rev B.
  - '[Promoted to Production] on 2025-09-25 10:30:00 by j.smith - Runs: Run 01, Run
